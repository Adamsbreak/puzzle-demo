<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>谜题棋盘编辑器</title>
<style>
:root{--bg:#f3efe6;--panel:#fffaf2;--line:#d4c5ab;--ink:#2d2418;--accent:#b7622b;--muted:#7e6f5d;--f:#5f6ee5;--h:#3f7dd1;--v:#31926d;--t:#c48f18;--b:#666;--sel:#ffb54d}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(135deg,#f7f3eb,#ece2cf);color:var(--ink)}
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}.sidebar{padding:18px;background:#fffaf2eb;border-right:1px solid var(--line);overflow:auto}.main{padding:18px;overflow:auto}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 10px 30px rgba(87,66,34,.08)}
h1,h2{margin:0 0 10px}h1{font-size:22px}h2{font-size:18px}.hint{font-size:12px;color:var(--muted)}
.grid2,.grid3{display:grid;gap:10px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}input,select,button,textarea{width:100%;font:inherit;border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:#fff;color:var(--ink)}textarea{min-height:120px;resize:vertical}button{cursor:pointer}.primary{background:var(--accent);border-color:var(--accent);color:#fff}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar button{width:auto;min-width:72px}.list{max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff}.item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 10px;border-bottom:1px solid #f1e6d5;cursor:pointer}.item:last-child{border-bottom:0}.item.active{background:#fff0d6}
.board-shell{display:inline-block;background:#ffffffba;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 20px 50px rgba(83,64,37,.12)}.board{position:relative;background:#fffdf8;margin:64px}.stats-bar{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.stat{background:#fffaf2;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px}
.cell,.piece,.edge-slot,.edge-region{position:absolute;border-radius:12px}.cell{border:1px solid #dacfbf;background:#fffaf1;overflow:hidden}.cell.blocked{background:#8a847d}.cell-tags{position:absolute;inset:4px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px;pointer-events:none}.mini{font-size:10px;line-height:1;padding:3px 5px;border-radius:999px;color:#fff}.f{background:var(--f)}.h{background:var(--h)}.v{background:var(--v)}.t{background:var(--t)}.b{background:var(--b)}.coord{position:absolute;right:5px;bottom:4px;font-size:10px;color:#0006}.edge-slot{background:#efe3cc;border:1px dashed #c6a977;opacity:.75}.edge-region{border:2px solid #2d24184d;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;text-align:center;padding:4px}.piece{border:2px solid #2d241873;box-shadow:0 12px 22px rgba(31,24,16,.18);display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;font-weight:700;user-select:none}.piece.selected{outline:4px solid var(--sel);z-index:5}.piece small{display:block;font-size:11px;opacity:.85}
.menu,.modal-mask{position:fixed;inset:0;z-index:50}.menu{pointer-events:none}.menu-box{position:absolute;min-width:180px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 40px rgba(0,0,0,.18);overflow:hidden;pointer-events:auto}.menu-item{padding:10px 12px;border-bottom:1px solid #f3ebde;cursor:pointer;background:#fff}.menu-item:last-child{border-bottom:0}.menu-item:hover{background:#fff4df}.modal-mask{display:none;background:#2d241861;align-items:center;justify-content:center}.modal-mask.open{display:flex}.modal{width:min(360px,calc(100vw - 24px));background:#fff;border-radius:16px;border:1px solid var(--line);padding:16px}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
@media (max-width:960px){.app{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><aside class="sidebar">
<div class="panel"><h1>谜题棋盘编辑器</h1><div class="hint">多标签格子规则、目标物、边缘 Zone、统一求解器。</div></div>
<div class="panel"><h2>棋盘设置</h2><div class="grid3"><div><label>行数</label><input id="rowsInput" type="number" min="2" max="20" value="6"></div><div><label>列数</label><input id="colsInput" type="number" min="2" max="20" value="6"></div><div><label>格子像素</label><input id="cellSizeInput" type="number" min="36" max="96" value="64"></div></div><div class="toolbar" style="margin-top:10px"><button id="applyBoardBtn" class="primary">应用棋盘</button><button id="toggleCoordsBtn">坐标显示: 开</button></div></div>
<div class="panel"><h2>编辑模式</h2><div class="grid2"><div><label>主模式</label><select id="mainModeSelect"><option value="cells">编辑格子</option><option value="objects">编辑物体</option></select></div><div><label>格子标签</label><select id="tagSelect"><option value="free">自由移动</option><option value="horizontal">横向</option><option value="vertical">竖向</option><option value="target-zone">目标物轨道</option><option value="blocked">禁止进入</option></select></div></div><div class="toolbar" style="margin-top:10px"><button id="paintAddBtn" class="primary">添加标签</button><button id="paintRemoveBtn">移除标签</button><button id="paintClearBtn">清空本格</button></div><div class="hint">目标物可以在 free 或 target-zone 上移动；终点请使用内部/边缘终点功能。</div></div>
<div class="panel"><h2>物体</h2><div class="toolbar"><button id="addPieceBtn" class="primary">新增障碍物</button><button id="addTargetBtn">新增目标物</button></div><div id="pieceList" class="list" style="margin-top:10px"></div></div>
<div class="panel"><h2>当前对象</h2><div class="grid2"><div><label>名称</label><input id="pieceNameInput"></div><div><label>类型</label><select id="pieceRoleInput"><option value="normal">普通障碍物</option><option value="target">目标物</option></select></div><div><label>宽</label><input id="pieceWInput" type="number" min="1" value="1"></div><div><label>高</label><input id="pieceHInput" type="number" min="1" value="1"></div><div><label>行</label><input id="pieceRowInput" type="number" min="-20" value="0"></div><div><label>列</label><input id="pieceColInput" type="number" min="-20" value="0"></div><div><label>移动规则</label><select id="pieceMoveRuleInput"><option value="free">自由</option><option value="horizontal">仅横向</option><option value="vertical">仅竖向</option><option value="blocked">不可移动</option></select></div><div><label>颜色</label><input id="pieceColorInput" type="color" value="#d26a4c"></div></div><div class="grid2" style="margin-top:10px"><label><input id="pieceAffectedByWindInput" type="checkbox" style="width:auto;margin-right:6px">受风影响</label><label><input id="pieceBlocksWindInput" type="checkbox" style="width:auto;margin-right:6px">阻挡风</label></div><div class="toolbar" style="margin-top:10px"><button id="applyPieceBtn" class="primary">应用对象</button><button id="duplicatePieceBtn">复制</button><button id="deletePieceBtn">删除</button></div></div>
<div class="panel"><h2>终点</h2><div class="toolbar"><button id="addInnerGoalBtn" class="primary">新增内部终点</button><button id="addEdgeGoalBtn">新增边缘终点</button></div><div class="hint" style="margin-top:10px">边缘终点允许目标物进入棋盘外终点区。障碍物始终只能在棋盘内运动。</div></div>
<div class="panel"><h2>环境</h2><div class="grid2"><div><label>风向</label><select id="windDirectionInput"><option value="east">向右</option><option value="west">向左</option><option value="north">向上</option><option value="south">向下</option></select></div><label style="align-self:end"><input id="windActiveInput" type="checkbox" style="width:auto;margin-right:6px">启用风</label></div><div class="hint" style="margin-top:10px">启用风后，求解器会自动切换到 settle 模式，在每次玩家操作后结算环境。</div></div>
<div class="panel"><h2>求解器</h2><div class="toolbar"><button id="solveBtn" class="primary">检查可解并求最优步骤</button></div><textarea id="solveOutput" readonly style="margin-top:10px;min-height:140px"></textarea></div>
<div class="panel"><h2>导入导出</h2><textarea id="jsonBox"></textarea><div class="toolbar" style="margin-top:10px"><button id="exportBtn" class="primary">导出 JSON</button><button id="importBtn">导入 JSON</button></div></div>
</aside><main class="main"><div class="panel"><h2>棋盘</h2><div class="hint">左键刷格子；左键对象可选中；右键对象或边缘槽创建/编辑 Zone；支持 Ctrl+C、Ctrl+V、Delete、Esc。</div></div><div class="board-shell"><div id="board" class="board"></div><div class="stats-bar"><div class="stat">操作步数: <strong id="opCount">0</strong></div><div class="stat">位移格数: <strong id="distCount">0</strong></div><button id="resetStatsBtn">重置计步</button></div></div></main></div>
<div id="menu" class="menu" hidden><div id="menuBox" class="menu-box"></div></div>
<div id="modalMask" class="modal-mask"><div class="modal"><h2 id="modalTitle">编辑</h2><div id="modalBody"></div><div class="modal-actions"><button id="modalCancelBtn">取消</button><button id="modalOkBtn" class="primary">确定</button></div></div></div>
<script type="module" src="./dist/editor/app.js"></script>
</body>
</html>
